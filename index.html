<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. The Surprise Overlay Screen -->
    <div id="surprise-overlay" class="overlay">
        <div class="overlay-card">
            <div class="gift-icon">🎁</div>
            <h2>You have a new message!</h2>
            <p>Click below to open your digital birthday surprise.</p>
            <button id="open-btn" class="cta-button">Open Surprise ✨</button>
        </div>
    </div>

    <!-- Hidden Background Audio -->
    <!-- Replace "music.mp3" with your actual audio filename uploaded to GitHub -->
    <audio id="bg-music" src="music.mp3" loop></audio>

    <!-- Container for floating elements generated by JavaScript -->
    <div id="floating-container"></div>

    <!-- 2. The Main Content (Initially Blurred out) -->
    <main id="main-content" class="container blurred">
        <!-- Hero Section -->
        <section class="hero-section">
            <h1 class="fade-in">Happy Birthday, <span class="highlight">Name</span> ✨</h1>
            <p class="subtitle fade-in-delayed">A little digital corner made just for you.</p>
        </section>

        <!-- Memory Card Section -->
        <section class="card fade-in-delayed">
            <div class="image-container">
                <!-- Replace with your local filename verbatim, e.g., "photo.jpg" -->
                <img src="20260623_145849.jpg" alt="Favorite Memory" class="profile-img">
            </div>
            <div class="text-container">
                <h2>To Someone Special,</h2>
                <p id="birthday-letter" class="letter-text"></p>
            </div>
        </section>
        
        <footer class="footer fade-in-delayed">
            <p>Made with 🤍</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
